name: R-CMD-check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::covr, any::roxygen2
          needs: check, coverage

      # Verify roxygen-generated files are up to date
      - name: Check roxygen2 is current
        run: |
          roxygen2::roxygenise()
          if (length(system2("git", c("diff", "--name-only"), stdout = TRUE))) {
            stop("man/ or NAMESPACE out of date. Run devtools::document() and commit.")
          }
        shell: Rscript {0}

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'

      - name: Test coverage
        if: success()
        run: |
          covr::codecov(quiet = FALSE)
        shell: Rscript {0}
